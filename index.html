<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guess the Song</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a2e; color: #eee; font-family: 'Georgia', serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
  h1 { font-size: 2.2rem; letter-spacing: 4px; margin-bottom: 6px; color: #f0c060; }
  .subtitle { font-size: 0.9rem; color: #888; margin-bottom: 40px; letter-spacing: 2px; }
  .controls { display: flex; gap: 12px; margin-bottom: 40px; flex-wrap: wrap; justify-content: center; }
  button { padding: 10px 28px; border: none; border-radius: 24px; font-size: 1rem; cursor: pointer; transition: all 0.2s; }
  #playBtn { background: #f0c060; color: #1a1a2e; font-weight: bold; }
  #playBtn:hover { background: #ffd080; }
  #playBtn:disabled { background: #555; color: #888; cursor: default; }
  #stopBtn { background: transparent; border: 2px solid #f0c060; color: #f0c060; }
  #stopBtn:hover { background: rgba(240,192,96,0.15); }
  .tempo { display: flex; align-items: center; gap: 10px; color: #aaa; font-size: 0.85rem; }
  input[type=range] { accent-color: #f0c060; width: 100px; }
  .sheet { width: 100%; max-width: 700px; }
  .line { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; padding: 10px 16px; background: rgba(255,255,255,0.04); border-radius: 10px; border-left: 3px solid transparent; transition: border-color 0.3s; }
  .line.active { border-left-color: #f0c060; background: rgba(240,192,96,0.08); }
  .note { padding: 4px 10px; border-radius: 16px; font-size: 1rem; transition: all 0.15s; cursor: default; }
  .note.playing { background: #f0c060; color: #1a1a2e; font-weight: bold; transform: scale(1.15); }
  .legend { margin-top: 40px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; font-size: 0.78rem; color: #888; }
  .legend span { background: rgba(255,255,255,0.06); padding: 3px 10px; border-radius: 10px; }
</style>
</head>
<body>

<h1>🎵 Guess the Song</h1>
<div class="subtitle">Indian Swaram Notation · A Minor</div>

<div class="controls">
  <button id="playBtn">▶ Play</button>
  <button id="stopBtn">■ Stop</button>
  <div class="tempo">
    <label>Tempo</label>
    <input type="range" id="tempo" min="60" max="240" value="220">
    <span id="tempoVal">220 BPM</span>
  </div>
</div>

<div class="sheet" id="sheet"></div>

<div class="legend">
  <span>Sa = A</span><span>Re = B</span><span>Ga = C</span><span>Ma = D</span>
  <span>Pa = E</span><span>Dha = F</span><span>Ni = G</span>
</div>

<script>
const SWARAM = [
  ["Ga","ma","pa","ga","re","sa"],
  ["Ga","ma","pa","ga","re","sa"],
  ["Sa","ri","ri","ri","ri","ni"],
  ["Dha","ni","dha","dha","ni","dha","pa","dha","ma"],
  ["Ga","ma","pa","ga","re","sa"],
  ["Ga","ma","pa","ga","re","sa"],
  ["Sa","ni","ni","ni","ni","ni"],
  ["Dha","ni","dha","dha","ni","dha","pa","ma"],
  ["Ma","dha","pa","sa","pa","dha","pa","sa"],
  ["Pa","ga","pa","ma","re","ma","ga"],
  ["Sa","re","re","ga","ga","ma","ma","pa","dha","pa","ma","ga","re"],
  ["Sa","re","re","ga","ga","ma","ma","pa","dha","pa","ma","ga","re"],
  ["Sa","re","re","ga","ga","ma","ma","pa"],
  ["Sa","re","re","ga","ga","ma","ma","pa"],
  ["Sa","re","re","ga","ga","ma","ma","pa"],
];

// A minor: Sa=A4, Re=B4, Ga=C5, Ma=D5, Pa=E5, Dha=F5, Ni=G5
const FREQ = {
  sa: 440.00, re: 493.88, ri: 493.88, ga: 523.25,
  ma: 587.33, pa: 659.25, dha: 698.46, ni: 783.99,
  Sa: 440.00, Re: 493.88, Ri: 493.88, Ga: 523.25,
  Ma: 587.33, Pa: 659.25, Dha: 698.46, Ni: 392.00,
};

// Build DOM
const sheet = document.getElementById('sheet');
const noteEls = [];
SWARAM.forEach((line, li) => {
  const div = document.createElement('div');
  div.className = 'line';
  div.id = 'line-' + li;
  line.forEach((n, ni) => {
    const span = document.createElement('span');
    span.className = 'note';
    span.id = `n-${li}-${ni}`;
    span.textContent = n;
    div.appendChild(span);
    noteEls.push({ el: span, lineEl: div, freq: FREQ[n] || 493.88 });
  });
  sheet.appendChild(div);
});

let audioCtx = null;
let playing = false;
let stopRequested = false;

function buildAudioGraph() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();

  // Concert-hall reverb via synthetic impulse response
  const convolver = ctx.createConvolver();
  const rate = ctx.sampleRate;
  const len = rate * 3.2;
  const ir = ctx.createBuffer(2, len, rate);
  for (let c = 0; c < 2; c++) {
    const d = ir.getChannelData(c);
    for (let i = 0; i < len; i++)
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 1.8);
  }
  convolver.buffer = ir;

  const reverbGain = ctx.createGain();
  reverbGain.gain.value = 0.45;
  convolver.connect(reverbGain);

  const comp = ctx.createDynamicsCompressor();
  comp.threshold.value = -14;
  comp.knee.value = 8;
  comp.ratio.value = 5;
  comp.attack.value = 0.004;
  comp.release.value = 0.2;
  comp.connect(ctx.destination);

  reverbGain.connect(comp);
  ctx._dry = comp;
  ctx._wet = convolver;
  return ctx;
}

function getCtx() {
  if (!audioCtx) audioCtx = buildAudioGraph();
  return audioCtx;
}

function scheduleOrchestraNote(freq, startTime, duration, ctx) {
  const tail = duration * 2.5;

  // --- Strings layer: 3 detuned sawtooth oscillators + lowpass filter + vibrato ---
  [-6, 0, 6].forEach((detune, idx) => {
    const osc = ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.value = freq;
    osc.detune.value = detune;

    // Vibrato LFO (kicks in after attack)
    const lfo = ctx.createOscillator();
    const lfoAmt = ctx.createGain();
    lfo.frequency.value = 5.2 + idx * 0.3;
    lfoAmt.gain.setValueAtTime(0, startTime);
    lfoAmt.gain.linearRampToValueAtTime(10, startTime + 0.12);
    lfo.connect(lfoAmt);
    lfoAmt.connect(osc.detune);

    // Warm lowpass filter (remove harshness)
    const filt = ctx.createBiquadFilter();
    filt.type = 'lowpass';
    filt.frequency.value = freq * 5;
    filt.Q.value = 0.8;

    const g = ctx.createGain();
    const amp = 0.10;
    g.gain.setValueAtTime(0, startTime);
    g.gain.linearRampToValueAtTime(amp, startTime + 0.08);   // slow bow attack
    g.gain.setValueAtTime(amp, startTime + duration * 0.75);
    g.gain.exponentialRampToValueAtTime(0.0001, startTime + tail);

    osc.connect(filt); filt.connect(g);
    g.connect(ctx._dry);
    g.connect(ctx._wet);

    lfo.start(startTime); lfo.stop(startTime + tail);
    osc.start(startTime); osc.stop(startTime + tail + 0.05);
  });

  // --- Brass/horn layer: filtered square wave, medium attack ---
  const brass = ctx.createOscillator();
  brass.type = 'square';
  brass.frequency.value = freq;
  const brassF = ctx.createBiquadFilter();
  brassF.type = 'lowpass';
  brassF.frequency.value = freq * 3;
  brassF.Q.value = 1.2;
  const brassG = ctx.createGain();
  brassG.gain.setValueAtTime(0, startTime);
  brassG.gain.linearRampToValueAtTime(0.06, startTime + 0.12);
  brassG.gain.setValueAtTime(0.06, startTime + duration * 0.6);
  brassG.gain.exponentialRampToValueAtTime(0.0001, startTime + tail * 0.8);
  brass.connect(brassF); brassF.connect(brassG);
  brassG.connect(ctx._dry);
  brassG.connect(ctx._wet);
  brass.start(startTime); brass.stop(startTime + tail);

  // --- Cello/bass doubling at octave below (adds body) ---
  const cello = ctx.createOscillator();
  cello.type = 'sawtooth';
  cello.frequency.value = freq / 2;
  const celloF = ctx.createBiquadFilter();
  celloF.type = 'lowpass';
  celloF.frequency.value = freq * 2;
  const celloG = ctx.createGain();
  celloG.gain.setValueAtTime(0, startTime);
  celloG.gain.linearRampToValueAtTime(0.07, startTime + 0.1);
  celloG.gain.setValueAtTime(0.07, startTime + duration * 0.7);
  celloG.gain.exponentialRampToValueAtTime(0.0001, startTime + tail);
  cello.connect(celloF); celloF.connect(celloG);
  celloG.connect(ctx._dry);
  celloG.connect(ctx._wet);
  cello.start(startTime); cello.stop(startTime + tail);
}

function clearHighlights() {
  noteEls.forEach(({ el, lineEl }) => {
    el.classList.remove('playing');
    lineEl.classList.remove('active');
  });
}

function playSong() {
  if (playing) return;
  playing = true;
  stopRequested = false;
  document.getElementById('playBtn').disabled = true;

  const ctx = getCtx();
  const bpm = parseInt(document.getElementById('tempo').value);
  const noteDur = 60 / bpm;
  const startTime = ctx.currentTime + 0.1;

  noteEls.forEach(({ freq }, i) => {
    scheduleOrchestraNote(freq, startTime + i * noteDur, noteDur, ctx);
  });

  noteEls.forEach(({ el, lineEl }, i) => {
    const delay = (startTime - ctx.currentTime + i * noteDur) * 1000;
    setTimeout(() => {
      if (stopRequested) return;
      clearHighlights();
      el.classList.add('playing');
      lineEl.classList.add('active');
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, delay);
  });

  const totalMs = (startTime - ctx.currentTime + noteEls.length * noteDur) * 1000;
  setTimeout(() => {
    clearHighlights();
    playing = false;
    stopRequested = false;
    document.getElementById('playBtn').disabled = false;
  }, totalMs + 800);
}

document.getElementById('playBtn').addEventListener('click', playSong);
document.getElementById('stopBtn').addEventListener('click', () => {
  stopRequested = true;
  playing = false;
  clearHighlights();
  document.getElementById('playBtn').disabled = false;
});

const tempoSlider = document.getElementById('tempo');
const tempoVal = document.getElementById('tempoVal');
tempoSlider.addEventListener('input', () => tempoVal.textContent = tempoSlider.value + ' BPM');
</script>
</body>
</html>
